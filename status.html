<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Universe | Live Monitor</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0b10;
            --card: #16161e;
            --accent: #f9e2af;
            --primary: #a6e3a1;
            --text: #cdd6f4;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            margin: 0; padding: 40px;
            display: flex; flex-direction: column; align-items: center;
        }
        .container { max-width: 800px; width: 100%; }
        h1 { font-family: 'Press Start 2P', cursive; color: var(--accent); font-size: 1.2rem; text-align: center; margin-bottom: 40px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .stat-val { font-size: 2.5rem; font-weight: 700; color: var(--primary); display: block; }
        .stat-label { color: #a6adc8; font-size: 0.9rem; margin-top: 5px; }

        .progress-container { width: 100%; height: 12px; background: #1e1e2e; border-radius: 10px; overflow: hidden; margin-bottom: 10px; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #a6e3a1, #94e2d5); width: 0%; transition: width 1s ease; }

        .log-container { background: #000; padding: 20px; border-radius: 15px; font-family: 'Consolas', monospace; font-size: 0.85rem; height: 200px; overflow-y: auto; border: 1px solid #313244; }
        .log-entry { margin-bottom: 5px; color: #89b4fa; }
        .log-entry.success { color: #a6e3a1; }

        .refresh-btn { margin-top: 20px; padding: 10px 20px; border-radius: 10px; border: none; background: var(--accent); cursor: pointer; font-weight: 700; }
    </style>
</head>
<body>
    <div class="container">
        <h1>UNIVERSE MONITOR</h1>
        
        <div class="grid">
            <div class="stat-card">
                <span id="totalCount" class="stat-val">0</span>
                <span class="stat-label">Total Target</span>
            </div>
            <div class="stat-card">
                <span id="readyCount" class="stat-val">0</span>
                <span class="stat-label">Items Ready</span>
            </div>
        </div>

        <div class="progress-container">
            <div id="progressBar" class="progress-bar"></div>
        </div>
        <div style="text-align: right; margin-bottom: 40px; font-size: 0.9rem; color: var(--primary);" id="progressText">0%</div>

        <div class="stat-card" style="margin-bottom: 40px;">
            <div class="stat-label">Last Updated</div>
            <div id="lastUpdate" style="font-size: 1.2rem; margin-top: 5px;">Never</div>
        </div>

        <div class="log-container" id="log">
            <div class="log-entry">Initializing monitor...</div>
        </div>

        <button class="refresh-btn" onclick="updateStatus()">Refresh Now</button>
    </div>

    <script>
        async function updateStatus() {
            try {
                const res = await fetch('meta.json');
                const data = await res.json();
                
                const total = data.object_count || 10000;
                // Since we don't have a backend to count files, we estimate from meta items that have actual paths
                // In a real environment, we'd check against a count from the server or file list
                // But for now, we'll use the items in meta.json that are organized
                const ready = data.items.filter(i => i.file_name.startsWith('images/')).length;
                
                document.getElementById('totalCount').innerText = total.toLocaleString();
                document.getElementById('readyCount').innerText = ready.toLocaleString();
                
                const percent = (ready / total * 100).toFixed(1);
                document.getElementById('progressBar').style.width = percent + '%';
                document.getElementById('progressText').innerText = percent + '% COMPLETED';
                
                document.getElementById('lastUpdate').innerText = new Date().toLocaleTimeString();
                
                const log = document.getElementById('log');
                const entry = document.createElement('div');
                entry.className = 'log-entry success';
                entry.innerText = `[${new Date().toLocaleTimeString()}] Status Check: ${ready} files synced.`;
                log.prepend(entry);
                
            } catch (err) {
                console.error(err);
            }
        }

        updateStatus();
        setInterval(updateStatus, 30000); // Auto refresh every 30s
    </script>
</body>
</html>

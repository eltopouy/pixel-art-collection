<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Art Universe | 10,000 Rare Icons</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body>
    <div id="selectionBar" class="selection-bar hidden">
        <div class="container bar-content">
            <span id="selectionCount">0 items selected</span>
            <div class="bar-buttons">
                <button id="selectAllBtn" class="btn-secondary">Select All on Page</button>
                <button id="downloadSelectedBtn" class="btn-primary">Download Selection (.ZIP)</button>
                <button id="deselectAllBtn" class="btn-text">Deselect All</button>
            </div>
        </div>
    </div>

    <header>
        <div class="container">
            <h1 class="logo">PIXEL UNIVERSE</h1>
            <p class="subtitle">10,000 AI-Enhanced Ultra 16-Bit Assets</p>
            
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search (e.g. 'Dragon', 'Sword')...">
                <select id="categoryFilter">
                    <option value="">All Categories</option>
                </select>
            </div>
        </div>
    </header>

    <main class="container">
        <div id="stats" class="stats">Loading metadata...</div>
        <div id="gallery" class="gallery">
            <!-- Images will be loaded here -->
        </div>
        <div id="loader" class="loader">Scroll for more...</div>

        <!-- Asset Inspection Modal -->
        <div id="assetModal" class="modal hidden">
            <span class="close-modal">&times;</span>
            <div class="modal-content">
                <div class="modal-image-container">
                    <img id="modalImg" src="" alt="">
                    <div class="modal-nav">
                        <button id="prevBtn">&larr;</button>
                        <button id="nextBtn">&rarr;</button>
                    </div>
                </div>
                <div class="modal-info">
                    <h2 id="modalTitle">Item Name</h2>
                    <div id="modalCategory" class="badge">Category</div>
                    <div id="modalTags" class="tags-container"></div>
                    <div class="modal-actions">
                        <button id="modalDownloadBtn" class="btn-primary">Download Image</button>
                        <button id="modalCopyBtn" class="btn-secondary">Copy URL</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Toast Notifications -->
        <div id="toastContainer" class="toast-container"></div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Pixel Universe Collection. Powered by Gemini Nano Banana Pro.</p>
            <p><a href="status.html" style="color: var(--accent); text-decoration: none; font-weight: 700; background: rgba(249, 226, 175, 0.1); padding: 5px 12px; border-radius: 5px; font-size: 0.8rem; margin-top: 10px; display: inline-block;">📊 VIEW LIVE GENERATION STATUS</a></p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>

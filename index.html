<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Art Universe | 10,000 Rare Icons</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container">
            <h1 class="logo">PIXEL UNIVERSE</h1>
            <p class="subtitle">10,000 AI-Enhanced Ultra 16-Bit Assets</p>
            
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search icons (e.g. 'Dragon', 'Sword', 'Life')...">
                <select id="categoryFilter">
                    <option value="">All Categories</option>
                </select>
            </div>
        </div>
    </header>

    <main class="container">
        <div id="stats" class="stats">Loading metadata...</div>
        <div id="gallery" class="gallery">
            <!-- Images will be loaded here -->
        </div>
        <div id="loader" class="loader">Scroll for more...</div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Pixel Universe Collection. Powered by Gemini Nano Banana Pro.</p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
